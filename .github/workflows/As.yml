name: Build APK YML Only

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Tarik Kode
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Build Android App (Pake Action Temuan Lu)
      uses: Narottam04/action-capacitor-android@v1.0.0

    - name: Upload Hasil APK
      uses: actions/upload-artifact@v4
      with:
        name: APK-Topup-Jadi
        # Pakai tanda bintang (**) biar dia nyari semua file APK yang dihasilkan
        path: android/app/build/outputs/apk/**/*.apk
