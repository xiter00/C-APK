name: Build APK Capacitor Tulen

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Tarik Kode
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install dependencies Capacitor
      run: npm install

    - name: Bikin Folder Android Pake Capacitor
      run: npx cap add android

    - name: Build APK Debug (Biar Langsung Bisa Di-install)
      working-directory: ./android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Hasil APK Capacitor
      uses: actions/upload-artifact@v4
      with:
        name: APK-Topup-Bisa-Diinstall
        path: android/app/build/outputs/apk/debug/app-debug.apk
        
